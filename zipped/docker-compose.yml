version: "3.8"

services:
  backend:
    build: ./backend
    container_name: lifetap-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./custom-art:/app/public/custom-art
    restart: unless-stopped
    networks:
      - npm-network

  frontend:
    build: ./frontend
    container_name: lifetap-frontend
    ports:
      - "8082:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - npm-network

networks:
  npm-network:
    external: true
